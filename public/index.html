<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yeo Kat Long — Graphics &amp; Systems Programmer</title>
  <meta name="description" content="Portfolio of Yeo Kat Long, graphics and systems programmer specialising in real-time interactive simulation and custom game engine development." />
  <meta property="og:title" content="Yeo Kat Long — Graphics &amp; Systems Programmer" />
  <meta property="og:description" content="C++, OpenGL, and assembly-level systems programming. Custom game engines built from scratch." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');</script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="site-nav">
    <a class="nav-logo" href="#hero">YKL</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
    <div class="theme-picker" id="theme-picker">
      <button class="theme-btn" id="theme-btn" aria-label="Change colour theme" aria-expanded="false" aria-haspopup="true">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <circle cx="5"  cy="5"  r="3.5" fill="#f07b3f"/>
          <circle cx="13" cy="5"  r="3.5" fill="#c8c8d8"/>
          <circle cx="5"  cy="13" r="3.5" fill="#00e87a"/>
          <circle cx="13" cy="13" r="3.5" fill="#c97dff"/>
        </svg>
      </button>
      <div class="theme-menu" id="theme-menu" hidden role="menu" aria-label="Colour themes">
        <button class="theme-opt" data-theme="dark"        role="menuitem"><span class="theme-dot" style="background:#f07b3f"></span>Dark</button>
        <button class="theme-opt" data-theme="light"       role="menuitem"><span class="theme-dot" style="background:#ea6025;box-shadow:0 0 0 1.5px #d1d5db inset"></span>Light</button>
        <button class="theme-opt" data-theme="neon-green"  role="menuitem"><span class="theme-dot" style="background:#00e87a"></span>Neon Green</button>
        <button class="theme-opt" data-theme="neon-purple" role="menuitem"><span class="theme-dot" style="background:#c97dff"></span>Neon Purple</button>
      </div>
    </div>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#repos">Repos</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="hero"><div class="container hero-content"></div></section>
  <section id="about"><div class="container"></div></section>
  <section id="projects"><div class="container"></div></section>
  <section id="skills"><div class="container"></div></section>
  <section id="experience"><div class="container"></div></section>
  <section id="repos"><div class="container"></div></section>
  <section id="contact"><div class="container contact-inner"></div></section>
  <footer></footer>

  <script src="main.js"></script>
</body>
</html>
